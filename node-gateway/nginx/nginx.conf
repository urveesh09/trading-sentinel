# Define rate limiting zone: 10MB memory, 30 requests per minute per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

server {
    listen 80;
    server_name 34.14.182.118; # Your Google Cloud Static IP

    # Gzip Compression for static assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Security Headers (Nginx level redundancy)
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";

    location / {
        # Apply Rate Limit
        #limit_req zone=api_limit burst=10 nodelay;

        # CRITICAL FIX: Point to the correct Docker service name
        proxy_pass http://node-gateway:3000;
        proxy_http_version 1.1;
        
        # WebSocket Upgrade Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
